<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARS Express RM → Tk Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff4d4d, #ff9966);
      background-image: url("BG.jpeg") ;
    background-image: url("BG.jpeg");
        background-size: cover;        /* fill screen */
     background-position: center;   /* center image */
     background-repeat: no-repeat;  /* prevent repeat */
     background-attachment: fixed;  /* smooth effect */

    min-height: 100vh;
    margin: 0;

  color: #fff;
  text-align: center;
  padding: 40px;
      color: #fff;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: rgba(19, 182, 117, 0.477);
      border-radius: 12px;
      padding: 25px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    input {
      padding: 10px;
      width: 80%;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      margin-top: 10px;
      text-align: center;
    }
    button {
      background-color: #fff;
      color: #ff4d4d;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
      font-weight: bold;
    }
    button:hover {
      background-color: #ffe6e6;
    }
    h1 { font-size: 24px; margin-bottom: 10px; }
    .result { font-size: 20px; margin-top: 20px; font-weight: bold; }
    .info { font-size: 14px; margin-top: 15px; color: yellow; }
  </style>
</head>
<body>

  <div class="box">
    <h1> <span > <img src="Photo/logo.jpg" height="100px" width="100px" style="border-radius: 50%;" alt=""> </span> <br> RM → Tk <br> Calculator</h1>
    <p>Exchange rate: <b>1 RM = 32.20 Tk (Today)</b></p>
    <input type="number" id="rmValue" placeholder="Enter price in RM" />
    <br>
    <button onclick="convert()">Calculate</button>
    <div class="result" id="result"></div>
    <div class="info">  The Price is exclude shipping cost. The weight charge KG/1000 Tk will be applicable. </div>
  </div>

  <script>
  function convert() {
    const rm = parseFloat(document.getElementById("rmValue").value);
    if (isNaN(rm) || rm <= 0) {
      document.getElementById("result").innerHTML = "Please enter a valid RM amount.";
      return;
    }

    let rate = 1.08; // default
    if (rm <= 50) rate = 1.3;
    else if (rm <= 100) rate = 1.2;
    else if (rm <= 300) rate = 1.15;
    else if (rm <= 600) rate = 1.12;
    else if (rm <= 1500) rate = 1.1;
    else if (rm <= 13000) rate = 1.1;
    else if (rm <= 20000) rate = 1.08;

    const tk = rm * 32.2 * rate;
    document.getElementById("result").innerHTML = `💵 Final Price: <b>${tk.toFixed(2)} Tk</b>`;
  }

  // Press Enter to calculate
  document.getElementById("rmValue").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      convert();
    }
  });
</script>

</body>
</html>
